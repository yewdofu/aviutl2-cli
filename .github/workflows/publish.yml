name: Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release"
        required: true

defaults:
  run:
    shell: bash

jobs:
  bump-version:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.set_version.outputs.new_version }}
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Rust
        shell: bash
        run: |
          rustup toolchain install --profile minimal

      - name: Set up cargo-binstall
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-binstall

      - name: Set up mise
        uses: jdx/mise-action@v4
        with:
          install: true
          experimental: true

      - name: Set version
        id: set_version
        run: |
          cargo set-version ${{ github.event.inputs.version }}
          echo "new_version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "release: v${{ steps.set_version.outputs.new_version }}"
          git tag ${{ steps.set_version.outputs.new_version }}
          TAG_SHA=$(git rev-parse HEAD)
          git bundle create /tmp/release.bundle ${{ steps.set_version.outputs.new_version }} $TAG_SHA ${{ github.ref }}
          echo "$TAG_SHA" > /tmp/tag_sha.txt
          echo "${{ steps.set_version.outputs.new_version }}" > /tmp/version.txt

      - name: Upload release bundle
        uses: actions/upload-artifact@v7
        with:
          name: release-bundle
          path: |
            /tmp/release.bundle
            /tmp/tag_sha.txt
            /tmp/version.txt

  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            prefix: -windows
          - os: ubuntu-latest
            prefix: -linux
    needs: bump-version
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download release bundle
        uses: actions/download-artifact@v8
        with:
          name: release-bundle

      - name: Unpack release bundle
        run: |
          TAG_SHA=$(cat tag_sha.txt)
          VERSION=$(cat version.txt)
          git fetch ./release.bundle refs/tags/$VERSION:refs/tags/$VERSION
          git pull ./release.bundle $TAG_SHA
          rm -rf ./release.bundle tag_sha.txt version.txt

      - name: Set up Rust
        shell: bash
        run: |
          rustup toolchain install --profile minimal

      - name: Cache rust
        uses: Swatinem/rust-cache@v2

      - name: Set up cargo-binstall
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-binstall

      - name: Set up mise
        uses: jdx/mise-action@v4
        with:
          install: true
          experimental: true

      - name: Prepare release
        shell: bash
        id: prepare
        run: |
          cargo build -r
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp target/release/au2.exe ./target/au2-v${{ github.event.inputs.version }}-windows.exe
            echo "au2_path=./target/au2-v${{ github.event.inputs.version }}-windows.exe" >> $GITHUB_OUTPUT
          else
            cp target/release/au2 ./target/au2-v${{ github.event.inputs.version }}-linux
            echo "au2_path=./target/au2-v${{ github.event.inputs.version }}-linux" >> $GITHUB_OUTPUT
          fi

          if [[ "${{ inputs.version }}" = *"-"* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: au2${{ matrix.prefix }}
          path: ${{ steps.prepare.outputs.au2_path }}
  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: publish
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download executables
        uses: actions/download-artifact@v8
        with:
          pattern: au2-*
          merge-multiple: true
          path: ./release-artifacts

      - name: Download release bundle
        uses: actions/download-artifact@v8
        with:
          name: release-bundle

      - name: Unpack release bundle
        id: prepare
        run: |
          TAG_SHA=$(cat tag_sha.txt)
          VERSION=$(cat version.txt)
          git fetch ./release.bundle refs/tags/$VERSION:refs/tags/$VERSION
          git pull ./release.bundle $TAG_SHA
          if [[ "$VERSION" = *"-"* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi
          rm -rf ./release.bundle tag_sha.txt version.txt

      - name: Set up Rust
        shell: bash
        run: |
          rustup toolchain install --profile minimal

      - name: Set up cargo-binstall
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-binstall

      - name: Set up mise
        uses: jdx/mise-action@v4
        with:
          install: true
          experimental: true

      - name: Push changes
        run: |
          git push origin --tags

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          prerelease: ${{ steps.prepare.outputs.is_prerelease }}
          fail_on_unmatched_files: true
          files: |
            ./release-artifacts/au2-*

      - name: Clean up release artifacts
        run: rm -rf ./release-artifacts

      - name: Login to crates.io
        uses: rust-lang/crates-io-auth-action@v1
        id: crates-io-auth

      - name: Publish to crates.io
        run: |
          cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-io-auth.outputs.token }}
